<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <title>Rooftop Planner — Print</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    @page { size: A4 landscape; margin: 1cm; }
    html, body {
      margin: 0; background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    * { box-sizing: border-box; }
    .page {
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      gap: 32px;
      page-break-after: always;
      break-after: page;
      padding: 12px 0 8px;
    }
    .page:last-child { page-break-after: auto; break-after: auto; }
    .frame {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      break-inside: avoid;
    }
    .label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      color: #6b7280; text-transform: uppercase;
    }
    .title-page {
      height: 95vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      text-align: center;
      page-break-after: always; break-after: page;
    }
    .title-page h1 {
      font-size: 56px; font-weight: 700; letter-spacing: -1px;
      margin: 0; color: #2b1f16;
    }
    .title-page p { font-size: 18px; color: #7b6653; margin: 0; max-width: 600px; line-height: 1.5; }
    .meta {
      margin-top: 20px; font-size: 12px; color: #9ca3af;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel">
    const VIBE = 'terracotta';
    const POSE = 'carousel';
    const DENSITY = 'zen';

    function PrintPhone({ children, label }) {
      return (
        <div className="frame">
          <div style={{ width: 242, height: 484, position: 'relative', overflow: 'visible' }}>
            <div style={{
              transform: 'scale(0.62)', transformOrigin: 'top left',
              width: 390, height: 780,
              position: 'absolute', top: 0, left: 0,
            }}>
              <Phone>{children}</Phone>
            </div>
          </div>
          <div className="label">{label}</div>
        </div>
      );
    }

    function App() {
      return (
        <VibeProvider vibe={VIBE} density={DENSITY}>
          <div className="title-page">
            <h1>Rooftop Planner</h1>
            <p>Redesign · Boum-inspired · mobile iPhone · 4 Screens</p>
            <div className="meta">Vibe: {VIBE} · Pose: {POSE} · Density: {DENSITY}</div>
          </div>

          <div className="page">
            <PrintPhone label="1 · Main · Container-Liste"><Screen1/></PrintPhone>
            <PrintPhone label="2 · Container-Detail"><Screen2 pose={POSE}/></PrintPhone>
          </div>

          <div className="page">
            <PrintPhone label="3 · Plant Profile · Bottom sheet"><Screen3 pose={POSE}/></PrintPhone>
            <PrintPhone label="4 · Giessen · Alle Töpfe"><Screen4/></PrintPhone>
          </div>
        </VibeProvider>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

    // Auto-print once everything is rendered. Babel transpiles this async,
    // so we wait for the root to actually have phone frames in it.
    (async () => {
      // Wait for React to mount the screens
      const root = document.getElementById('root');
      const waitForMount = () => new Promise(resolve => {
        const start = Date.now();
        const tick = () => {
          if (root.querySelectorAll('.frame').length >= 4) return resolve();
          if (Date.now() - start > 8000) return resolve();
          requestAnimationFrame(tick);
        };
        tick();
      });
      await waitForMount();

      // Wait for all background images and <img> tags to load
      const imgs = Array.from(document.images);
      await Promise.all(imgs.map(img => img.complete ? null :
        new Promise(r => { img.onload = img.onerror = r; })));

      if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(e) {} }

      // Extra settle time for layout
      await new Promise(r => setTimeout(r, 1500));
      if (!location.search.includes('noprint')) window.print();
    })();
  </script>
</body>
</html>
