<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <title>Rooftop Planner — Redesign</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    html, body { margin: 0; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
    * { box-sizing: border-box; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "vibe": "terracotta",
      "pose": "carousel",
      "density": "zen"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <VibeProvider vibe={t.vibe} density={t.density}>
          <DesignCanvas>
            <DCSection id="s-main" title="Rooftop Planner · Redesign" subtitle="Boum-inspired · mobile iPhone · tweakable vibe / pose / density">
              <DCArtboard id="sc1" label="1 · Main · Container-Liste" width={390} height={780}>
                <Phone><Screen1/></Phone>
              </DCArtboard>
              <DCArtboard id="sc2" label="2 · Container-Detail · Stacked plant cards" width={390} height={780}>
                <Phone><Screen2 pose={t.pose}/></Phone>
              </DCArtboard>
              <DCArtboard id="sc3" label="3 · Plant Profile · Bottom sheet" width={390} height={780}>
                <Phone><Screen3 pose={t.pose}/></Phone>
              </DCArtboard>
              <DCArtboard id="sc4" label="4 · Giessen · Alle Töpfe" width={390} height={780}>
                <Phone><Screen4/></Phone>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
          <TweaksPanel title="Rooftop Tweaks">
            <TweakSection label="Vibe" />
            <TweakRadio label="Visual personality"
              value={t.vibe}
              options={['gallery','terracotta','nordic']}
              onChange={(v)=>setTweak('vibe', v)} />
            <TweakSection label="Card pose" />
            <TweakRadio label="Stack behaviour"
              value={t.pose}
              options={['stack','fan','carousel']}
              onChange={(v)=>setTweak('pose', v)} />
            <TweakSection label="Density" />
            <TweakRadio label="Information rhythm"
              value={t.density}
              options={['zen','balanced','packed']}
              onChange={(v)=>setTweak('density', v)} />
          </TweaksPanel>
        </VibeProvider>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
